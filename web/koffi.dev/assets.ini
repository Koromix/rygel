EsbuildPath = ../../vendor/esbuild/native/node_modules/@esbuild
EsbuildRoot = ../..

[favicon.webp]
Type = Copy
From = static/koffi.webp

[static]
Type = Copy
From = static
Ignore = koffi.webp *.js *.css

[static/site.min.js]
Type = Bundle
Source = ../../lib/web/flat/static.js

[static/highlight.min.js]
Type = Bundle
Source = static/highlight.js

[static/site.min.css]
Type = Bundle
Source = static/koffi.css
Options = --loader:.woff2=file --loader:.png=file --loader:.webp=file

[static/benchmarks.min.js]
Type = Bundle
Source = static/benchmarks.js
