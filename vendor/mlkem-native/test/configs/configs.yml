  - path: test/configs/custom_heap_alloc_config.h
    description: "Test configuration with heap-based allocation"
    defines:
      MLK_CONFIG_CUSTOM_ALLOC_FREE:
        content: |
          #define MLK_CONFIG_CUSTOM_ALLOC_FREE
          #if !defined(__ASSEMBLER__)
          #include <stdlib.h>
          #define MLK_CUSTOM_ALLOC(v, T, N)                            \
            T* v = (T *)aligned_alloc(MLK_DEFAULT_ALIGN,               \
                                     MLK_ALIGN_UP(sizeof(T) * (N)))
          #define MLK_CUSTOM_FREE(v, T, N) free(v)
          #endif /* !__ASSEMBLER__ */

  - path: examples/basic_deterministic/mlkem_native/mlkem_native_config.h
    description: "Configuration for deterministic-only build of mlkem-native"
    defines:
      MLK_CONFIG_NAMESPACE_PREFIX: mlkem
      MLK_CONFIG_NO_RANDOMIZED_API: true
      MLK_CONFIG_FILE:
        comment: "/* No need to set this -- we _are_ already in a custom config */"

  - path: proofs/cbmc/mlkem_native_config_cbmc.h
    description: "mlkem-native configuration used for CBMC proofs, using instrumented alloc/free"
    defines:
      MLK_CONFIG_NAMESPACE_PREFIX: mlk
      MLK_CONFIG_KEYGEN_PCT: true
      MLK_CONFIG_CUSTOM_ALLOC_FREE:
        content: |
          #define MLK_CONFIG_CUSTOM_ALLOC_FREE
          #if !defined(__ASSEMBLER__)
          #include <stdlib.h>
          #define MLK_CUSTOM_ALLOC(v, T, N) T* v = (T *)malloc(sizeof(T) * (N))
          #define MLK_CUSTOM_FREE(v, T, N) free(v)
          #endif /* !__ASSEMBLER__ */
      MLK_CONFIG_FILE:
        comment: "/* No need to set this -- we _are_ already in a custom config */"

  - path: test/configs/test_alloc_config.h
    description: "Using custom allocation that can be made fail at specific invocation"
    defines:
      MLK_CONFIG_NAMESPACE_PREFIX: mlk
      MLK_CONFIG_CONTEXT_PARAMETER: true
      MLK_CONFIG_CONTEXT_PARAMETER_TYPE: struct test_ctx_t *
      MLK_CONFIG_CUSTOM_ALLOC_FREE:
        content: |
          #define MLK_CONFIG_CUSTOM_ALLOC_FREE
          #if !defined(__ASSEMBLER__)
          #include <stdlib.h>
          struct test_ctx_t; /* Forward declaration */
          void * custom_alloc(struct test_ctx_t *ctx, size_t sz, const char *file, int line, const char *var, const char *type);
          void custom_free(struct test_ctx_t *ctx, void *p, size_t sz, const char *file, int line, const char *var, const char *type);
          #define MLK_CUSTOM_ALLOC(v, T, N, ctx) T *v = custom_alloc(ctx, sizeof(T)*(N), __FILE__, __LINE__, #v, #T)
          #define MLK_CUSTOM_FREE(v, T, N, ctx) custom_free(ctx, v, sizeof(T)*(N), __FILE__, __LINE__, #v, #T)
          #endif /* !__ASSEMBLER__ */
      MLK_CONFIG_FILE:
        comment: "/* No need to set this -- we _are_ already in a custom config */"

